name: Test

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build_and_test_arm64:
    runs-on: ubuntu-24.04-arm

    strategy:
      matrix:
        gcc_version: [13]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v6

    - name: Host properties
      run: lscpu

    - name: Install toolchain
      run: |
        sudo apt-get update 
        sudo apt-get -y install g++-${{matrix.gcc_version}}
        sudo apt-get install python3-numpy

    - name: Configure CMake
      run: cmake ./prj/cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DSIMD_TOOLCHAIN="g++-${{matrix.gcc_version}}" -DSIMD_TARGET="" -DSIMD_TEST_FLAGS="-march=native -march=armv9-a+sve2" -DSIMD_SVE=ON -DSIMD_SVE2=ON -DSIMD_SHARED=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}} --parallel$(nproc)
      
    - name: Test C++
      working-directory: ${{github.workspace}}/build
      run: |
        export LD_LIBRARY_PATH="${{github.workspace}}/build":$LD_LIBRARY_PATH
        ./Test "-r=.." -m=a -tt=4 -ts=5 -mt=10 -w=640 -h=480 -c=256
        
    - name: Test Python
      working-directory: ${{github.workspace}}/build
      run: python3 ./Test.py "-r=.."
      
name: MSBuildTest

on:
  push:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  build_and_test_vs2022:
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Debug, Release]
        platform: [Win32, x64]

    steps:
    - uses: actions/checkout@v6

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ./prj/vs2022 -Project2ProjectTimeOut 300

    - name: Host properties
      shell: powershell
      run: echo "$((Get-CimInstance Win32_Processor).Name), $((Get-CimInstance Win32_Processor).NumberOfCores) cores, $((Get-CimInstance Win32_Processor).NumberOfLogicalProcessors) threads."

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{matrix.build_type}} /p:Platform=${{matrix.platform}} -maxCpuCount:4 ./prj/vs2022/Simd.sln
     
    - name: Test
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: bin\v143\${{matrix.platform}}\${{matrix.build_type}}\Test.exe "-r=." -m=a -tt=4 "-ot=log_${{matrix.platform}}_${{matrix.build_type}}.txt" -ts=5 -mt=1 -w=640 -h=480 -c=256

